<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neon Time Lab Classroom</title>

<style>

body{
background:#0a0f1f;
font-family:Arial;
color:#00f7ff;
text-align:center;
}

h1{
text-shadow:0 0 15px #00f7ff;
}

button{
background:#111;
border:2px solid #00f7ff;
color:#00f7ff;
padding:8px 14px;
margin:6px;
cursor:pointer;
}

button:hover{
background:#00f7ff;
color:black;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
padding:20px;
}

.clock{
width:180px;
height:180px;
border:4px solid #00f7ff;
border-radius:50%;
margin:auto;
position:relative;
background:black;
}

.number{
position:absolute;
transform:translate(-50%,-50%);
font-size:14px;
}

.hash{
position:absolute;
width:2px;
height:6px;
background:#00f7ff;
left:50%;
top:0;
transform-origin:center 90px;
}

.hand{
position:absolute;
left:50%;
top:50%;
transform-origin:bottom center;
transform:translate(-50%,-100%) rotate(0deg);
}

.hour{
height:40px;
width:5px;
background:#ff00ff;
}

.minute{
height:65px;
width:3px;
background:#00ffcc;
cursor:pointer;
}

.center{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
width:70px;
text-align:center;
margin-top:6px;
}

.correct{color:#00ff66;}
.incorrect{color:#ff0033;}

</style>
</head>

<body>

<h1>Neon Time Lab Classroom</h1>

Name:
<input id="studentName">

<br><br>

<button onclick="startRead()">Read the Clock</button>
<button onclick="startSet()">Set the Clock</button>
<button onclick="checkAnswers()">Check Score</button>
<button onclick="resetLab()">Reset</button>

<h2 id="score"></h2>

<div class="grid" id="clockGrid"></div>

<script>

let mode="read";
let targets=[];
let studentMinutes=[];

const grid=document.getElementById("clockGrid");

/* CREATE CLOCKS */

for(let i=0;i<10;i++){

let area=document.createElement("div");

area.innerHTML=`

<div class="clock" id="clock${i}">
<div class="hand hour" id="hour${i}"></div>
<div class="hand minute" id="minute${i}"></div>
<div class="center"></div>
</div>

<div id="target${i}"></div>
<input id="input${i}">
<div id="result${i}"></div>

`;

grid.appendChild(area);

targets[i]=0;
studentMinutes[i]=0;
}

/* DRAW CLOCK MARKS */

for(let c=0;c<10;c++){

const clock=document.getElementById("clock"+c);

for(let n=1;n<=12;n++){

let num=document.createElement("div");
num.className="number";

let angle=(n*30-90)*Math.PI/180;

let x=90+70*Math.cos(angle);
let y=90+70*Math.sin(angle);

num.style.left=x+"px";
num.style.top=y+"px";
num.innerText=n;

clock.appendChild(num);

}

for(let m=0;m<60;m++){

let mark=document.createElement("div");
mark.className="hash";
mark.style.transform="rotate("+m*6+"deg)";
clock.appendChild(mark);

}

}

/* DRAW HANDS */

function drawClock(i,total){

studentMinutes[i]=total;

let minuteDeg=(total%60)*6;
let hourDeg=(total%720)*0.5;

document.getElementById("minute"+i)
.style.transform="translate(-50%,-100%) rotate("+minuteDeg+"deg)";

document.getElementById("hour"+i)
.style.transform="translate(-50%,-100%) rotate("+hourDeg+"deg)";

}

/* RANDOM TIMES */

function randomTime(){

return Math.floor(Math.random()*720);

}

/* START READ MODE */

function startRead(){

mode="read";

for(let i=0;i<10;i++){

targets[i]=randomTime();

drawClock(i,targets[i]);

document.getElementById("target"+i).innerText="";
document.getElementById("input"+i).value="";
document.getElementById("result"+i).innerText="";

}

}

/* START SET MODE */

function startSet(){

mode="set";

for(let i=0;i<10;i++){

targets[i]=randomTime();

drawClock(i,0);

document.getElementById("target"+i).innerText=
"Set to "+formatTime(targets[i]);

document.getElementById("input"+i).style.display="none";

}

}

/* FORMAT TIME */

function formatTime(t){

let h=Math.floor(t/60)%12;
if(h===0)h=12;

let m=t%60;

return h+":"+(m<10?"0"+m:m);

}

/* CHECK ANSWERS */

function checkAnswers(){

let correct=0;

for(let i=0;i<10;i++){

let res=document.getElementById("result"+i);

if(mode==="read"){

let val=document.getElementById("input"+i).value;

if(val===formatTime(targets[i])){

correct++;
res.innerText="✔";
res.className="correct";

}else{

res.innerText="✘";
res.className="incorrect";

}

}

if(mode==="set"){

if(studentMinutes[i]===targets[i]){

correct++;
res.innerText="✔";
res.className="correct";

}else{

res.innerText="✘";
res.className="incorrect";

}

}

}

document.getElementById("score").innerText=
document.getElementById("studentName").value+
" Score: "+correct+"/10";

}

/* RESET */

function resetLab(){

location.reload();

}

</script>

</body>
</html>
